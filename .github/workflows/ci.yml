name: CI (Windows build)

# Builds Mimic Neo (crate: sai-recorder) for Windows on every push/PR.
#
#   build  -> compiles the release exe and uploads it as an artifact
#   test   -> downloads that exact exe artifact and exercises it:
#               * --selftest : headless capture -> compress -> encode pipeline
#               * --measure  : real compression benchmark over bench/frames
#             then uploads measure-results.json
#   release-> publishes the exe (+ bundles) on v* tags
#
# The test job consumes the *uploaded artifact* rather than rebuilding, so we
# verify the exact binary that ships. The benchmark frames in bench/frames are
# real 1920x1080 screenshots, making the compression numbers reproducible in CI.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  ARTIFACT_NAME: mimic-neo-windows-x64

jobs:
  build:
    name: Build release exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-msvc

      - name: Build (release)
        run: cargo build --release --locked

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: target/release/sai-recorder.exe
          if-no-files-found: error
          retention-days: 30

  test:
    name: Test (uses build artifact)
    needs: build
    runs-on: windows-latest
    steps:
      - name: Checkout (for bench/frames fixture)
        uses: actions/checkout@v4

      - name: Download exe artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: bin

      - name: Headless pipeline smoke test (--selftest)
        run: .\bin\sai-recorder.exe --selftest

      - name: Compression benchmark (--measure bench/frames)
        run: .\bin\sai-recorder.exe --measure bench/frames

      - name: Show measurement summary
        if: always()
        run: |
          if (Test-Path measure-results.json) {
            Get-Content measure-results.json -Raw
          } else {
            Write-Error "measure-results.json was not produced"
          }

      - name: Upload measurement results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: measure-results
          path: measure-results.json
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish release (tags only)
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable, MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-msvc

      - name: Build release + bundles
        run: cargo build --release --locked

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/sai-recorder.exe
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
          fail_on_unmatched_files: false
          generate_release_notes: true
