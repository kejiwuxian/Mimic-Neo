name: CI (Windows build)

# Builds Mimic Neo (crate: sai-recorder) for Windows on every push/PR, runs the
# headless pipeline smoke test, and uploads the runnable exe as an artifact.
# Tag pushes (v*) additionally publish a GitHub Release with the exe + MSI installer.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # needed by the release job to attach assets

jobs:
  build:
    name: Build & smoke test (windows-latest)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          # Keep the cache keyed to the manifest so dependency bumps invalidate it.
          key: windows-msvc

      # WebView2 runtime is preinstalled on windows-latest runners, so no extra
      # setup is required to compile the Tauri frontend assets into the binary.
      - name: Build (release)
        run: cargo build --release --locked

      - name: Smoke test (headless pipeline selftest)
        # --selftest synthesizes a task end-to-end and exits 0 on success.
        run: .\target\release\sai-recorder.exe --selftest

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: mimic-neo-windows-x64
          path: target/release/sai-recorder.exe
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish release (tags only)
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable MSVC)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-msvc

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      # Produces the bare exe + bundled MSI/NSIS installers under target/release.
      - name: Build bundle
        run: cargo tauri build

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/sai-recorder.exe
            target/release/bundle/msi/*.msi
            target/release/bundle/nsis/*.exe
          fail_on_unmatched_files: false
          generate_release_notes: true
