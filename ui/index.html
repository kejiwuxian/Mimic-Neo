<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-md overflow-hidden relative selection:bg-primary-container selection:text-on-primary-container">

<header class="text-center flex flex-col items-center gap-md">

<span class="material-symbols-outlined text-[32px] text-primary" style="font-variation-settings: 'FILL' 1;">

                    </span>
</div>
<div class="space-y-sm">
<h1 class="font-headline-xl text-headline-xl text-on-surface tracking-tight">Welcome to Sai Recorder</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[500px] mx-auto">Choose your primary workflow to get started.</p>
</div>
</header>
<!-- Workflow Selection Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md mt-sm" id="workflow-selection">
<!-- Card 1: Automate -->
<button class="option-card text-left relative p-lg rounded-xl bg-surface border-2 border-outline-variant/30 hover:border-outline transition-all duration-300 flex flex-col gap-lg group cursor-pointer focus:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 focus-visible:ring-offset-background" type="button">
<div class="flex justify-between items-start w-full">
<div class="icon-container w-12 h-12 rounded-lg bg-surface-variant flex items-center justify-center text-on-surface-variant transition-colors duration-300">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">
                                smart_toy
                            </span>
</div>
<div class="check-indicator w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center transition-colors duration-300">
<span class="check-icon material-symbols-outlined text-[14px] text-on-primary opacity-0 transition-opacity duration-300 font-bold">
                                check
                            </span>
</div>
</div>
<div>
<h2 class="font-headline-md text-headline-md text-on-surface mb-xs group-hover:text-primary transition-colors">Automate a workflow</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Record repetitive tasks to replay or hand off to an AI agent.</p>
</div>
</button>

<div class="flex justify-between items-start w-full">
<div class="icon-container w-12 h-12 rounded-lg bg-surface-variant flex items-center justify-center text-on-surface-variant transition-colors duration-300">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">

</button>

                    Continue
                    <span class="material-symbols-outlined text-[18px]">
                        arrow_forward
                    </span>
</button>

</main>
<!-- Inline script for micro-interactions (Selection Logic) -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.option-card');
            const continueBtn = document.getElementById('continue-btn');

            cards.forEach(card => {
                card.addEventListener('click', () => {
                    // Deselect all
                    cards.forEach(c => c.classList.remove('selected'));
                    
                    // Select clicked
                    card.classList.add('selected');
                    
                    // Enable Continue button with Primary styling
                    continueBtn.disabled = false;
                    continueBtn.classList.remove('bg-surface-variant', 'text-on-surface-variant', 'cursor-not-allowed', 'opacity-70');
                    continueBtn.classList.add('bg-primary', 'text-on-primary', 'hover:bg-primary-fixed', 'hover:shadow-[0_0_20px_rgba(173,198,255,0.3)]', 'cursor-pointer', 'opacity-100');
                });
            });
        });
    </script>
